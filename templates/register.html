{% extends "auth_layout.html" %}
{% block title %}Register{% endblock %}
{% block auth_subtitle %}Create your account{% endblock %}

{% block auth_content %}
<form method="POST" action="{{ url_for('register') }}">
    <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" required minlength="3" placeholder="Choose username">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Email (optional)</label>
        <input type="email" name="email" class="form-control" placeholder="you@email.com">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required minlength="6" placeholder="Min 6 characters">
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary btn-analyze w-100 mb-3">
        <i class="bi bi-person-plus me-2"></i>Create Account
    </button>
</form>
<hr>
<p class="text-center small mb-0">
    Already have an account? <a href="{{ url_for('login') }}">Login</a>
</p>
{% endblock %}
