{% extends "auth_layout.html" %}
{% block title %}User Login{% endblock %}
{% block auth_subtitle %}Sign in to analyze voice sentiment{% endblock %}

{% block auth_content %}
<form method="POST" action="{{ url_for('login') }}">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control form-control-lg" required autofocus placeholder="Enter username">
    </div>
    <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" required placeholder="Enter password">
    </div>
    <button type="submit" class="btn btn-primary btn-analyze w-100 mb-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
    </button>
</form>
<hr>
<p class="text-center small mb-2">
    Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
</p>
<p class="text-center small mb-0">
    <a href="{{ url_for('admin_login') }}" class="text-muted"><i class="bi bi-shield-lock me-1"></i>Admin Login</a>
</p>
{% endblock %}
